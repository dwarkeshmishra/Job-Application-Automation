<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Calibri', 'Segoe UI', sans-serif; margin: 40px 50px;
         font-size: 10.5pt; line-height: 1.45; color: #2d2d2d; }
  h1 { font-size: 24pt; color: #1a1a2e; letter-spacing: 1px; margin-bottom: 4px; }
  .header { text-align: center; margin-bottom: 20px; padding-bottom: 12px;
            border-bottom: 3px solid #0f3460; }
  .contact { color: #555; font-size: 9.5pt; margin-top: 4px; }
  .contact a { color: #0f3460; text-decoration: none; }
  h2 { font-size: 12pt; color: #0f3460; text-transform: uppercase; letter-spacing: 1.5px;
       border-bottom: 1.5px solid #e0e0e0; padding-bottom: 3px; margin: 16px 0 8px 0; }
  .summary { font-size: 10.5pt; color: #444; margin-bottom: 4px; }
  .skills-grid { display: flex; flex-wrap: wrap; gap: 4px 20px; }
  .skill-cat { margin-bottom: 4px; }
  .skill-cat strong { color: #1a1a2e; }
  .entry { margin-bottom: 10px; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .entry-header h3 { font-size: 11pt; color: #1a1a2e; }
  .entry-header .date { font-size: 9.5pt; color: #888; font-style: italic; }
  .company { color: #555; font-size: 10pt; }
  .tech { color: #0f3460; font-size: 9pt; font-weight: normal; }
  .meta { color: #888; font-size: 9pt; }
  ul { margin: 3px 0 0 18px; }
  li { margin-bottom: 2px; }
  .cert-list { columns: 2; }
</style>
</head>
<body>
<div class="header">
  <h1>{{NAME}}</h1>
  <p class="contact">{{EMAIL}} | {{PHONE}}</p>
</div>
<h2>Professional Summary</h2>
<p class="summary">{{SUMMARY}}</p>
</body>
</html>
