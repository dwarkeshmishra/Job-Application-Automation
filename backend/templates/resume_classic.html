<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Times New Roman', 'Georgia', serif; margin: 50px 60px;
         font-size: 11pt; line-height: 1.5; color: #333; }
  h1 { font-size: 22pt; text-align: center; margin-bottom: 2px; }
  .contact { text-align: center; font-size: 10pt; color: #555; margin-bottom: 16px; }
  h2 { font-size: 12pt; text-transform: uppercase; border-bottom: 1px solid #333;
       padding-bottom: 2px; margin: 14px 0 6px 0; }
  .entry { margin-bottom: 8px; }
  .entry h3 { font-size: 11pt; font-weight: bold; }
  .date { float: right; font-style: italic; color: #666; }
  ul { margin: 2px 0 0 20px; }
  li { margin-bottom: 2px; }
</style>
</head>
<body>
<h1>{{NAME}}</h1>
<p class="contact">{{EMAIL}} | {{PHONE}}</p>
<h2>Summary</h2>
<p>{{SUMMARY}}</p>
</body>
</html>
