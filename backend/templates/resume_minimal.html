<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Helvetica Neue', 'Arial', sans-serif; margin: 40px 50px;
         font-size: 10pt; line-height: 1.4; color: #222; }
  h1 { font-size: 20pt; font-weight: 300; letter-spacing: 2px; margin-bottom: 4px; }
  .contact { font-size: 9pt; color: #777; margin-bottom: 18px; }
  h2 { font-size: 9pt; text-transform: uppercase; letter-spacing: 3px; color: #999;
       margin: 16px 0 6px 0; }
  .entry { margin-bottom: 8px; }
  .entry h3 { font-size: 10pt; font-weight: 600; }
  .entry-header { display: flex; justify-content: space-between; align-items: baseline; }
  .date { font-size: 9pt; color: #888; font-style: italic; }
  .company { color: #666; font-size: 9.5pt; }
  .tech { color: #777; font-size: 8.5pt; font-weight: normal; }
  .meta { font-size: 9pt; color: #888; }
  .skills-grid { margin-bottom: 6px; }
  .skill-cat { margin-bottom: 2px; font-size: 9.5pt; }
  ul { margin: 2px 0 6px 16px; }
  li { margin-bottom: 1px; font-size: 9.5pt; }
</style>
</head>
<body>
<h1>{{NAME}}</h1>
<p class="contact">{{EMAIL}} &middot; {{PHONE}}</p>
<h2>About</h2>
<p>{{SUMMARY}}</p>
</body>
</html>
