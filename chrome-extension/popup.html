<!DOCTYPE html>
<html>
<head>
  <style>
    body { width: 320px; padding: 16px; font-family: 'Inter', 'Segoe UI', sans-serif;
           background: #0a0e1a; color: #f1f5f9; margin: 0; }
    h2 { font-size: 14px; margin: 0 0 12px 0; background: linear-gradient(135deg, #6366f1, #8b5cf6);
         -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    button { width: 100%; padding: 10px; border: none; border-radius: 8px; cursor: pointer;
             font-size: 13px; font-weight: 600; background: linear-gradient(135deg, #6366f1, #8b5cf6);
             color: white; transition: all 0.2s; }
    button:hover { transform: translateY(-1px); box-shadow: 0 4px 12px rgba(99,102,241,0.4); }
    #status { margin-top: 10px; font-size: 12px; text-align: center; min-height: 20px; }
  </style>
</head>
<body>
  <h2>🚀 Job Copilot</h2>
  <button id="captureBtn">📋 Capture This Job</button>
  <div id="status"></div>
  <script src="popup.js"></script>
</body>
</html>
